name: Deployments

on:
  workflow_call:
    secrets:
      KUBECONFIG:
        required: true
      TAILSCALE_OAUTH_CLIENT_ID:
        required: true
      TAILSCALE_OAUTH_SECRET:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  configure:
    # Configuration is derived from the pull request / tag that triggered the
    # run. The scheduled cleanup has no such trigger and doesn't need it.
    if: github.event_name != 'schedule'
    name: Generate Configuration
    runs-on: ubuntu-latest
    outputs:
      application_name: ${{ steps.config.outputs.application_name }}
      environment: ${{ steps.config.outputs.environment }}
      is_production: ${{ steps.config.outputs.is_production }}
      image: ${{ steps.config.outputs.image }}
      hostname: ${{ steps.config.outputs.hostname }}
      certificate_issuer: ${{ steps.config.outputs.certificate_issuer }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Rutger505-Org/kubernetes-infrastructure
          path: infrastructure

      - name: Configuration
        id: config
        uses: actions/github-script@v7
        env:
          BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
          APPLICATION_NAME: ${{ vars.APPLICATION_NAME }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        with:
          script: |
            const { default: generateConfig } = await import('${{ github.workspace }}/infrastructure/.github/scripts/deployment/config.mjs');

            return await generateConfig({ core, context });

  build-docker-image:
    if: github.event.action != 'closed'
    name: Build Docker image
    needs: [configure]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.configure.outputs.image }}
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=development
            type=gha,scope=main
          cache-to: |
            type=gha,mode=max,scope=${{ github.ref_name }}
            ${{ startsWith(github.ref, 'refs/tags/') && 'type=gha,mode=max,scope=main' || '' }}

  deploy-to-kubernetes:
    if: github.event.action != 'closed'
    name: Deploy to Kubernetes
    needs: [configure, build-docker-image]
    runs-on: ubuntu-latest

    environment:
      name: ${{ needs.configure.outputs.environment }}
      url: https://${{ needs.configure.outputs.hostname }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Rutger505-Org/kubernetes-infrastructure
          path: infrastructure

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup Kubernetes
        uses: ./infrastructure/.github/actions/setup-kubernetes
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Generate deployment environment variables
        id: env
        uses: actions/github-script@v8
        env:
          SECRETS: ${{ toJSON(secrets) }}
          VARS: ${{ toJSON(vars) }}
        with:
          script: |
            const { default: generateDeploymentEnvironment } = await import('${{ github.workspace }}/infrastructure/.github/scripts/deployment/deployment-variables.mjs');
            return await generateDeploymentEnvironment(
              core,
              {
                filterPrefix: 'DEPLOYMENT_',
                unfilteredVars: JSON.parse(process.env.VARS),
                vars: {},

                unfilteredSecrets: JSON.parse(process.env.SECRETS),
                secrets: {},
              },
            );

      - name: OpenTofu Apply
        working-directory: ./deploy
        env:
          TF_VAR_application_name: ${{ needs.configure.outputs.application_name }}
          TF_VAR_image: ${{ needs.configure.outputs.image }}
          TF_VAR_hostname: ${{ needs.configure.outputs.hostname }}
          TF_VAR_certificate_issuer: ${{ needs.configure.outputs.certificate_issuer }}
          TF_VAR_config: ${{ steps.env.outputs.vars }}
          TF_VAR_secrets: ${{ steps.env.outputs.secrets }}
        run: |
          tofu init
          tofu workspace select -or-create ${{ needs.configure.outputs.environment }}
          tofu apply -input=false -auto-approve

  destroy-pr-environment:
    if: github.event.action == 'closed'
      && needs.configure.outputs.is_production == 'false'
      && contains(needs.configure.outputs.environment, 'pr-')
    name: Destroy PR Environment
    needs: [configure]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.configure.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Rutger505-Org/kubernetes-infrastructure
          path: infrastructure

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup Kubernetes
        uses: ./infrastructure/.github/actions/setup-kubernetes
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: OpenTofu Destroy
        working-directory: ./deploy
        env:
          TF_VAR_application_name: ${{ needs.configure.outputs.application_name }}
          TF_VAR_image: ${{ needs.configure.outputs.image }}
          TF_VAR_hostname: ${{ needs.configure.outputs.hostname }}
          TF_VAR_certificate_issuer: ${{ needs.configure.outputs.certificate_issuer }}
        run: |
          tofu init
          tofu workspace select ${{ needs.configure.outputs.environment }} || exit 0
          tofu apply -input=false -auto-approve -destroy
          tofu workspace select default
          tofu workspace delete ${{ needs.configure.outputs.environment }}

  cleanup-pr-environments:
    # Runs on a schedule (configured by the caller) to garbage-collect PR
    # environments whose pull request was abandoned, i.e. never closed/merged
    # so the per-PR `destroy-pr-environment` job never fired.
    if: github.event_name == 'schedule'
    name: Cleanup Abandoned PR Environments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Rutger505-Org/kubernetes-infrastructure
          path: infrastructure

      - name: List open pull requests
        id: open_prs
        uses: actions/github-script@v8
        with:
          script: |
            const { default: listOpenPullRequests } = await import('${{ github.workspace }}/infrastructure/.github/scripts/deployment/open-pull-requests.mjs');
            return await listOpenPullRequests({ github, context, core });

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup Kubernetes
        uses: ./infrastructure/.github/actions/setup-kubernetes
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: OpenTofu Destroy Abandoned PR Environments
        working-directory: ./deploy
        env:
          OPEN_PR_NUMBERS: ${{ steps.open_prs.outputs.numbers }}
          # Only application_name matters for a destroy: it keys the backend
          # state and the resource names. The other required variables are
          # placeholders that satisfy validation while resources are torn down.
          TF_VAR_application_name: ${{ vars.APPLICATION_NAME }}
          TF_VAR_image: unused
          TF_VAR_hostname: unused
          TF_VAR_certificate_issuer: letsencrypt-staging
        run: |
          set -euo pipefail

          tofu init

          environments=$(tofu workspace list | sed 's/^[*]//' | tr -d ' ' | grep -E '^pr-[0-9]+$' || true)

          if [ -z "$environments" ]; then
            echo "No PR environments found."
            exit 0
          fi

          for environment in $environments; do
            number="${environment#pr-}"

            if echo " $OPEN_PR_NUMBERS " | grep -q " $number "; then
              echo "Keeping $environment (PR #$number is still open)."
              continue
            fi

            echo "Destroying $environment (PR #$number is not open)."
            tofu workspace select "$environment"
            tofu apply -input=false -auto-approve -destroy
            tofu workspace select default
            tofu workspace delete "$environment"
          done
